# okf-wiki-kit configuration.
# Copy to `okf.config.yaml` and edit. Run `okf build` in the same directory.

# ---------------------------------------------------------------------------
# Source adapter — where your content comes from.
#   Built-in:  "markdown_folder"  (zero code; point it at a folder of .md files)
#   Custom:    "path/to/adapter.py:AdapterClass"  (your own SourceAdapter subclass)
# ---------------------------------------------------------------------------
adapter: markdown_folder
adapter_options:
  path: ./notes            # folder of .md files (markdown_folder adapter)
  default_type: Note       # OKF `type:` for files with no `type` in frontmatter

# Where to write the generated vault (open this folder in Obsidian).
output: ./vault
# clean: true               # wipe the output dir before each build (false = keep stray files)

# ---------------------------------------------------------------------------
# Wikilinks (Obsidian). "wikilink" = [[basename|Display]] ; "markdown" = [Display](path.md)
# ---------------------------------------------------------------------------
link_style: wikilink

# ---------------------------------------------------------------------------
# Mention-based link inference (optional). Scans the bodies of `scan_types`
# for the titles/aliases of `concept_type` nodes and links them both ways.
# Leave `concept_type` empty to disable.
# ---------------------------------------------------------------------------
link_inference:
  concept_type: ""         # e.g. "Concept"
  scan_types: []           # e.g. ["Section"]
  min_surface_len: 5       # ignore surface strings shorter than this
  exclude_titles: ["References"]   # skip these node titles when scanning

# ---------------------------------------------------------------------------
# LLM enrichment (optional; run `okf enrich`). Writes enrichment.json which
# `okf build` then consumes. Provider auto-detected from env keys if unset.
# ---------------------------------------------------------------------------
enrich:
  provider: null           # "anthropic" | "openai" ; null = auto-detect from env
  model: null              # default: claude-opus-4-8 / qwen/qwen3.7-plus
  base_url: null           # OpenAI-compatible base URL (default OpenRouter)
  describe_types: []       # node types to get a one-line `description:` e.g. ["Chapter","Case Study"]
  canonicalize_type: ""    # node type to merge duplicates/synonyms, e.g. "Concept" ("" = off)

# ---------------------------------------------------------------------------
# Serving the built vault to LLMs/agents (optional).
# `rag`: semantic index over the built vault — `okf index` / `okf search` / `okf ask`.
# Requires the "rag" extra (numpy) plus an embedding provider:
#   voyage (VOYAGE_API_KEY) | openai (OPENAI_API_KEY) | local (model2vec, no key).
# The index is written to `.okf/` next to this config (never inside the vault).
# `mcp`: read-only MCP server (`okf serve`, stdio) — requires the "mcp" extra.
# ---------------------------------------------------------------------------
serve:
  rag:
    embedding:
      provider: null       # "voyage" | "openai" | "local" ; null = auto-detect from env keys
      model: null          # default: voyage-3.5-lite / text-embedding-3-small / minishlab/potion-base-8M
      base_url: null       # OpenAI-compatible embeddings URL (default api.openai.com — NOT OpenRouter)
    chunk_max_chars: 4000  # split notes longer than this at ##/### headings (default: 1000 for provider local, else 4000)
    exclude_types: [Index, Home]   # note types to skip when indexing
    top_k: 8               # default number of notes for `okf search` / `okf ask`
  mcp:
    name: okf-wiki         # MCP server name shown to clients
    max_note_chars: 20000  # okf_get_note body window (longer bodies paginate via `offset`)
