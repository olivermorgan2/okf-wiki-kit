name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published.
# Auth is via PyPI Trusted Publishing (OIDC) — no API token is stored.
# The `publish` job runs only if the full test suite passes first.

on:
  release:
    types: [published]
  workflow_dispatch: {}        # allow manual runs from the Actions tab (build+test only unless a release)

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with test dependencies
        # dev = pytest; rag = numpy (Phase 7 tests); mcp = MCP SDK (Phase 8 tests).
        # voyage/openai/local-embeddings are intentionally omitted — tests use fakes.
        run: pip install -e ".[dev,rag,mcp]"
      - name: Run tests
        run: python -m pytest -q

  publish:
    needs: test               # gate: no green tests, no release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi         # optional protection layer; must match the PyPI trusted-publisher config
    permissions:
      id-token: write         # REQUIRED for Trusted Publishing (OIDC); no other perms granted
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify built version matches the release tag
        # Guards against tagging v0.3.0 but forgetting to bump the version in pyproject.
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE=$(ls dist/*.whl | sed -E 's/.*okf_wiki_kit-([^-]+)-.*/\1/')
          echo "release tag: $TAG   built wheel version: $FILE"
          test "$TAG" = "$FILE" || { echo "::error::tag ($TAG) != built version ($FILE) — bump the version in pyproject.toml/okfkit.__init__ to match the tag"; exit 1; }
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
